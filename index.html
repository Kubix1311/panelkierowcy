<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel Kierowcy</title>
<style>
body {margin:0;font-family:Arial;background:#0d1117;color:#fff}
.container {display:flex;justify-content:center;align-items:center;height:100vh}
.login-box {background:#161b22;padding:30px;border-radius:12px;width:300px}
input {width:100%;padding:10px;margin:10px 0;background:#0d1117;border:1px solid #30363d;color:#fff;border-radius:8px}
button {width:100%;padding:10px;background:#2388ff;border:none;border-radius:8px;color:#fff;cursor:pointer}
.panel {display:none;padding:20px}
.cards {display:flex;gap:20px;flex-wrap:wrap}
.card {background:#161b22;padding:20px;border-radius:12px;flex:1;min-width:350px;max-height:500px;overflow:auto}
table {width:100%;border-collapse:collapse;font-size:11px}
td,th {border:1px solid #30363d;padding:4px;text-align:center}
h3 {margin-top:0;margin-bottom:10px}
</style>
</head>
<body>

<div class="container" id="login">
  <div class="login-box">
    <h2>Logowanie</h2>
    <input id="user" placeholder="Nick Discord">
    <input id="pass" type="password" placeholder="Hasło">
    <button onclick="login()">Zaloguj</button>
    <p id="err"></p>
  </div>
</div>

<div class="panel" id="panel">
  <h2 id="welcome"></h2>
  <div class="cards">
    <div class="card" id="info"></div>
    <div class="card" id="vehicle"></div>
    <div class="card" id="schedule"></div>
  </div>
</div>

<script>

const stops709 = ["Nowy Bieżanów P+R","Ćwiklińskiej","Teligi","Prokocim Szpital","Wlotowa","Bieżanowska"];

// Przerwy
function getBreak(user, stop){
    if((user.linia==3 || user.linia==24) && stop==="Dajwór") return 3;
    if(user.linia==143 && stop==="Prokocim Szpital") return 3;
    if(user.linia==709 && stop==="Bieżanowska") return 3;
    return 10;
}

// Harmonogram
function generateFullSchedule(user){
    let html="<table><tr><th>Godzina</th><th>Przystanek</th></tr>";
    let time=19*60 + user.start;
    while(time < 21*60){
        for(let direction=0; direction<2; direction++){
            let stops = direction===0 ? user.stops : [...user.stops].reverse();
            for(let i=0;i<stops.length;i++){
                if(time>=21*60) break;
                html+=`<tr><td>${Math.floor(time/60).toString().padStart(2,'0')}:${(time%60).toString().padStart(2,'0')}</td><td>${stops[i]}</td></tr>`;
                time++;
            }
            time += getBreak(user, stops[stops.length-1]);
        }
    }
    html+="</table>";
    return html;
}

// Logowanie
function login(){
    let u=document.getElementById('user').value;
    let p=document.getElementById('pass').value;
    if(users[u] && users[u].pass===p){
        document.getElementById('login').style.display='none';
        document.getElementById('panel').style.display='block';
        let user=users[u];
        document.getElementById('welcome').innerText="Witaj "+u;
        document.getElementById('info').innerHTML=`<h3>Informacje</h3>Linia: ${user.linia}<br>Brygada: ${user.brygada}`;
        document.getElementById('vehicle').innerHTML=`<h3>Pojazd</h3>${user.pojazd}`;
        document.getElementById('schedule').innerHTML="<h3>Pełny rozkład (19‑21)</h3>"+generateFullSchedule(user);
    }else{
        document.getElementById('err').innerText="Błędne dane";
    }
}
</script>

</html>
